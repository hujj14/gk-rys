<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Заявка на охрану | ГК-РЫСЬ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f8fafc;
            color: #0f172a;
            line-height: 1.5;
        }

        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap');

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .navbar {
            background: #ffffff;
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 32px;
        }

        .logo {
            font-size: 26px;
            font-weight: 700;
            color: #0f172a;
            text-decoration: none;
            cursor: pointer;
        }
        .logo span {
            color: #2c5f5f;
        }

        .form-card {
            background: white;
            border-radius: 32px;
            padding: 40px;
            margin: 48px 0;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.08);
            border: 1px solid #eef2f8;
        }

        .form-card h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #0f172a;
        }

        .form-card .sub {
            color: #5b6e8c;
            margin-bottom: 32px;
            border-left: 3px solid #2c5f5f;
            padding-left: 16px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            color: #1e2a3a;
        }
        label .required {
            color: #e74c3c;
            margin-left: 4px;
        }

        input, textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #cfdfe9;
            border-radius: 20px;
            font-size: 1rem;
            font-family: inherit;
            transition: 0.2s;
            background: #fff;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #2c5f5f;
            box-shadow: 0 0 0 3px rgba(44, 95, 95, 0.1);
        }

        input.error, textarea.error {
            border-color: #e74c3c;
            background: #fff5f5;
        }

        .error-text {
            color: #e74c3c;
            font-size: 0.75rem;
            margin-top: 4px;
            display: block;
        }

        .btn-submit {
            background: #2c5f5f;
            color: white;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 12px;
        }

        .btn-submit:hover {
            background: #1e4a4a;
            transform: translateY(-2px);
        }

        .status {
            margin-top: 20px;
            text-align: center;
            padding: 12px;
            border-radius: 40px;
            font-size: 0.9rem;
        }

        footer {
            text-align: center;
            padding: 24px;
            color: #7f8c8d;
            border-top: 1px solid #e2e8f0;
            background: white;
        }

        @media (max-width: 640px) {
            .form-card {
                padding: 28px;
            }
            .nav-inner {
                padding: 0 20px;
            }
        }
    </style>
</head>
<body>

<header class="navbar">
    <div class="nav-inner">
        <a href="index.html" class="logo" id="mainLogo">ГК-<span>РЫСЬ</span></a>
    </div>
</header>

<div class="container">
    <div class="form-card">
        <h1>Заявка на охрану</h1>
        <div class="sub">Заполните форму — мы свяжемся с вами в течение 30 минут</div>

        <form id="requestForm">
            <div class="form-group">
                <label>Ваше ФИО <span class="required">*</span></label>
                <input type="text" id="name" placeholder="Иван Иванов Иванович">
                <span class="error-text" id="nameError"></span>
            </div>

            <div class="form-group">
                <label>Контактный телефон <span class="required">*</span></label>
                <input type="tel" id="phone" placeholder="+7 999 123-45-67">
                <span class="error-text" id="phoneError"></span>
            </div>

            <div class="form-group">
                <label>Email <span class="required">*</span></label>
                <input type="email" id="email" placeholder="ivan@company.ru">
                <span class="error-text" id="emailError"></span>
            </div>

            <div class="form-group">
                <label>Тип объекта <span class="required">*</span></label>
                <input type="text" id="objectType" placeholder="Жилой комплекс, Бизнес центр, Завод, Склад...">
                <span class="error-text" id="objectTypeError"></span>
            </div>

            <div class="form-group">
                <label>Дополнительная информация</label>
                <textarea rows="3" id="comment" placeholder="Количество постов, режим работы, особые требования..."></textarea>
            </div>

            <button type="submit" class="btn-submit">Отправить заявку</button>
            <div id="formStatus" class="status"></div>
        </form>
    </div>
</div>

<footer>
    <p>© 2026 ГК-РЫСЬ — Комплексная безопасность объектов. Лицензия ЧОП.</p>
</footer>

<script>
    const API_URL = 'https://api.gkrys.ru/api/submit-request';
    const form = document.getElementById('requestForm');
    const statusDiv = document.getElementById('formStatus');

    // Поля
    const nameInput = document.getElementById('name');
    const phoneInput = document.getElementById('phone');
    const emailInput = document.getElementById('email');
    const objectTypeInput = document.getElementById('objectType');

    // Ошибки
    const nameError = document.getElementById('nameError');
    const phoneError = document.getElementById('phoneError');
    const emailError = document.getElementById('emailError');
    const objectTypeError = document.getElementById('objectTypeError');

    // Очистка ошибок
    function clearErrors() {
        nameError.textContent = '';
        phoneError.textContent = '';
        emailError.textContent = '';
        objectTypeError.textContent = '';
        nameInput.classList.remove('error');
        phoneInput.classList.remove('error');
        emailInput.classList.remove('error');
        objectTypeInput.classList.remove('error');
    }

    // Валидация email
    function isValidEmail(email) {
        const re = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
        return re.test(email);
    }

    // Валидация телефона
    function isValidPhone(phone) {
        const digits = phone.replace(/[^\d+]/g, '');
        return digits.length >= 10;
    }

    // Проверка и показ ошибок
    function validateAndShowErrors() {
        let isValid = true;

        // Имя
        const name = nameInput.value.trim();
        if (name === '') {
            nameError.textContent = 'Введите ФИО';
            nameInput.classList.add('error');
            isValid = false;
        } else if (name.length < 2) {
            nameError.textContent = 'Минимум 2 символа';
            nameInput.classList.add('error');
            isValid = false;
        } else {
            nameError.textContent = '';
            nameInput.classList.remove('error');
        }

        // Телефон
        const phone = phoneInput.value.trim();
        if (phone === '') {
            phoneError.textContent = 'Введите номер телефона';
            phoneInput.classList.add('error');
            isValid = false;
        } else if (!isValidPhone(phone)) {
            phoneError.textContent = 'Введите корректный номер (минимум 10 цифр)';
            phoneInput.classList.add('error');
            isValid = false;
        } else {
            phoneError.textContent = '';
            phoneInput.classList.remove('error');
        }

        // Email
        const email = emailInput.value.trim();
        if (email === '') {
            emailError.textContent = 'Введите email';
            emailInput.classList.add('error');
            isValid = false;
        } else if (!isValidEmail(email)) {
            emailError.textContent = 'Введите корректный email (example@mail.ru)';
            emailInput.classList.add('error');
            isValid = false;
        } else {
            emailError.textContent = '';
            emailInput.classList.remove('error');
        }

        // Тип объекта
        const objectType = objectTypeInput.value.trim();
        if (objectType === '') {
            objectTypeError.textContent = 'Укажите тип охраняемого объекта';
            objectTypeInput.classList.add('error');
            isValid = false;
        } else if (objectType.length < 3) {
            objectTypeError.textContent = 'Укажите тип объекта подробнее (минимум 3 символа)';
            objectTypeInput.classList.add('error');
            isValid = false;
        } else {
            objectTypeError.textContent = '';
            objectTypeInput.classList.remove('error');
        }

        return isValid;
    }

    // Отправка формы
    form.onsubmit = async (e) => {
        e.preventDefault();

        // Очищаем старые ошибки
        clearErrors();

        // Проверяем и показываем ошибки
        const isValid = validateAndShowErrors();

        if (!isValid) {
            statusDiv.innerHTML = 'Заполните все обязательные поля';
            statusDiv.style.background = '#fee2e2';
            statusDiv.style.color = '#991b1b';
            return;
        }

        const name = nameInput.value.trim();
        const phone = phoneInput.value.trim();
        const email = emailInput.value.trim();
        const objectType = objectTypeInput.value.trim();
        const comment = document.getElementById('comment').value;

        statusDiv.innerHTML = 'Отправка...';
        statusDiv.style.background = '#eef2ff';
        statusDiv.style.color = '#1e3a8a';

        const payload = { name, phone, email, objectType, comment };

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (response.ok) {
                statusDiv.innerHTML = 'Заявка принята! Мы свяжемся с вами.';
                statusDiv.style.background = '#dcfce7';
                statusDiv.style.color = '#166534';
                form.reset();
                clearErrors();
            } else {
                statusDiv.innerHTML = `Ошибка: ${data.error || 'Попробуйте позже'}`;
                statusDiv.style.background = '#fee2e2';
                statusDiv.style.color = '#991b1b';
            }
        } catch (error) {
            statusDiv.innerHTML = 'Не удалось соединиться с сервером.';
            statusDiv.style.background = '#fee2e2';
            statusDiv.style.color = '#991b1b';
        }
    };
</script>
</body>
</html>
